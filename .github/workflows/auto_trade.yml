name: AI Auto Trading Cycle

on:
  schedule:
    - cron: '0 * * * *' # 매 정시마다 실행 (1시간 간격)
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: supporters/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Cycle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
        run: python main.py

      - name: Commit and Push logs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add logs/trading_log.json
          git commit -m "Update trading logs [skip ci]" || echo "No changes to commit"
          git push
