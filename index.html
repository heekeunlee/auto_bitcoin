<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Institutional Trading Terminal | BTC</title>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-terminal: #0b0e11; /* Binance-style deep dark */
            --card-bg: #161a1e;
            --border-color: #2b2f36;
            --text-main: #eaecef;
            --text-dim: #848e9c;
            --accent: #fcd535; /* Gold accent */
            --buy: #00c076;
            --sell: #cf304a;
            --hold: #474d57;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-terminal);
            color: var(--text-main);
            padding: 16px;
            overflow-x: hidden;
        }

        .terminal-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 16px;
        }

        @media (max-width: 1100px) {
            .terminal-container { grid-template-columns: 1fr; }
        }

        /* Top Bar */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-badge { background: var(--accent); color: #000; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 12px; }
        .market-ticker { font-weight: 700; font-size: 18px; }

        /* Left Side: Charts */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        #tvChart {
            width: 100%;
            height: 550px;
        }

        /* Right Side: Analysis & History */
        .side-bar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .price-display {
            font-size: 32px;
            font-family: var(--font-mono);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .decision-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .badge-buy { background: rgba(0, 192, 118, 0.15); color: var(--buy); border: 1px solid var(--buy); }
        .badge-sell { background: rgba(207, 48, 74, 0.15); color: var(--sell); border: 1px solid var(--sell); }
        .badge-hold { background: rgba(71, 77, 87, 0.15); color: var(--hold); border: 1px solid var(--hold); }

        .indicator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .indicator-item {
            background: #1e2329;
            padding: 12px;
            border-radius: 8px;
        }

        .ind-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .ind-value { font-size: 14px; font-weight: 600; }

        .analysis-text {
            font-size: 14px;
            line-height: 1.6;
            background: #1e2329;
            padding: 16px;
            border-radius: 8px;
            color: var(--text-main);
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .history-time { font-size: 12px; color: var(--text-dim); }
        .history-price { font-family: var(--font-mono); font-size: 13px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="terminal-container">
        <header>
            <div class="logo-area">
                <div class="logo-badge">PRO-AI</div>
                <div class="market-ticker">BTC / KRW</div>
            </div>
            <div id="connectionStatus" style="font-size: 12px; color: var(--buy);">● Terminal Live</div>
        </header>

        <!-- Main Chart Section -->
        <div class="main-content">
            <div class="chart-card">
                <div class="panel-title">Institutional Advanced Charting <span id="chartTicker">BTCUSDT (Upbit)</span></div>
                <div id="tvChart"></div>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div class="side-bar">
            <!-- Market Status Panel -->
            <div class="panel">
                <div class="panel-title">Real-time Terminal</div>
                <div class="price-display" id="mainPrice">--</div>
                <div id="mainDecision" class="decision-badge badge-hold">AWAITING SIGNAL</div>
                
                <div class="indicator-grid">
                    <div class="indicator-item">
                        <div class="ind-label">RSI (14)</div>
                        <div class="ind-value" id="rsiVal">--</div>
                    </div>
                    <div class="indicator-item">
                        <div class="ind-label">MFI</div>
                        <div class="ind-value" id="mfiVal">--</div>
                    </div>
                    <div class="indicator-item">
                        <div class="ind-label">SuperTrend</div>
                        <div class="ind-value" id="stVal">--</div>
                    </div>
                    <div class="indicator-item">
                        <div class="ind-label">Trend Structure</div>
                        <div class="ind-value" id="trendVal">--</div>
                    </div>
                </div>
            </div>

            <!-- AI Insight Panel -->
            <div class="panel">
                <div class="panel-title">AI Quantitative Insight</div>
                <div id="aiReason" class="analysis-text">퀀트 엔진 분석 데이터 수신 중...</div>
            </div>

            <!-- Trade History -->
            <div class="panel">
                <div class="panel-title">Log History</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        let chart, candleSeries, volumeSeries, rsiSeries, ema20Series, ema50Series;

        function initChart() {
            const chartOptions = {
                layout: {
                    background: { type: 'solid', color: '#161a1e' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: 'rgba(42, 46, 57, 0.5)' },
                    horzLines: { color: 'rgba(42, 46, 57, 0.5)' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                priceScale: { borderColor: '#485c7b' },
                timeScale: { borderColor: '#485c7b', timeVisible: true, secondsVisible: false },
            };

            chart = LightweightCharts.createChart(document.getElementById('tvChart'), chartOptions);
            
            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });

            // Volume Series
            volumeSeries = chart.addHistogramSeries({
                color: '#26a69a',
                priceFormat: { type: 'volume' },
                priceScaleId: '', // Overlay over price
            });
            volumeSeries.priceScale().applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            // EMA Series
            ema20Series = chart.addLineSeries({ color: '#2962FF', lineWidth: 1, title: 'EMA 20' });
            ema50Series = chart.addLineSeries({ color: '#FF6D00', lineWidth: 1, title: 'EMA 50' });

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: document.getElementById('tvChart').clientWidth });
            });
        }

        async function loadTradingData() {
            try {
                const response = await fetch('logs/trading_log.json');
                const data = await response.json();
                
                if (data.length === 0) return;

                const latest = data[data.length - 1];
                updateUI(latest);
                updateHistory(data);

                // Prepare Chart Data
                const ohlcvData = latest.ohlcv_with_indicators_last_24h;
                const candleData = [];
                const volumeData = [];
                const ema20Data = [];
                const ema50Data = [];

                // Sort by time
                const sortedTimeKeys = Object.keys(ohlcvData).sort();
                
                sortedTimeKeys.forEach(timeStr => {
                    const d = ohlcvData[timeStr];
                    const timestamp = Math.floor(new Date(timeStr).getTime() / 1000);
                    
                    candleData.push({
                        time: timestamp,
                        open: d.open, high: d.high, low: d.low, close: d.close
                    });
                    
                    volumeData.push({
                        time: timestamp,
                        value: d.volume,
                        color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
                    });

                    if (d.ema_20) ema20Data.push({ time: timestamp, value: d.ema_20 });
                    if (d.ema_50) ema50Data.push({ time: timestamp, value: d.ema_50 });
                });

                candleSeries.setData(candleData);
                volumeSeries.setData(volumeData);
                ema20Series.setData(ema20Data);
                ema50Series.setData(ema50Data);

                // Fitting the chart
                chart.timeScale().fitContent();

            } catch (error) {
                console.error('Data loading error:', error);
            }
        }

        function updateUI(latest) {
            document.getElementById('mainPrice').innerText = latest.current_price.toLocaleString() + ' KRW';
            const decision = latest.decision;
            const badge = document.getElementById('mainDecision');
            badge.innerText = decision === 'BUY' ? 'STRONGE BUY SIGNAL' : (decision === 'SELL' ? 'SELL SIGNAL' : 'NEUTRAL / HOLD');
            badge.className = 'decision-badge ' + (decision === 'BUY' ? 'badge-buy' : (decision === 'SELL' ? 'badge-sell' : 'badge-hold'));

            if (latest.market_summary_now) {
                const msn = latest.market_summary_now;
                document.getElementById('rsiVal').innerText = msn.rsi || '--';
                document.getElementById('mfiVal').innerText = msn.mfi || '--';
                document.getElementById('stVal').innerText = msn.supertrend === 1 ? 'Bullish' : (msn.supertrend === -1 ? 'Bearish' : '--');
                document.getElementById('stVal').style.color = msn.supertrend === 1 ? 'var(--buy)' : 'var(--sell)';
                document.getElementById('trendVal').innerText = msn.trend_ema20_vs_50 || '--';
            }

            document.getElementById('aiReason').innerText = latest.reason;
        }

        function updateHistory(data) {
            const list = document.getElementById('historyList');
            const reverseData = data.slice().reverse();
            list.innerHTML = reverseData.slice(0, 20).map(log => `
                <div class="history-item">
                    <div>
                        <div class="history-price">${log.current_price.toLocaleString()}</div>
                        <div class="history-time">${log.timestamp.split(' ')[1]}</div>
                    </div>
                    <div style="font-weight: 700; color: ${log.decision === 'BUY' ? 'var(--buy)' : (log.decision === 'SELL' ? 'var(--sell)' : 'var(--text-dim)')}">
                        ${log.decision}
                    </div>
                </div>
            `).join('');
        }

        initChart();
        loadTradingData();
        // Refresh every minute for pro feel
        setInterval(loadTradingData, 60000);
    </script>
</body>
</html>
