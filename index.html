<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Institutional Trading Terminal | BTC</title>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-terminal: #f2f4f6; /* Toss-style light gray background */
            --card-bg: #ffffff;
            --border-color: #f2f4f6;
            --text-main: #191f28; /* Deep gray for text */
            --text-dim: #4e5968;
            --accent: #3182f6; /* Toss Blue */
            --buy: #f04452; /* Toss-style red for up */
            --sell: #3182f6; /* Toss-style blue for down */
            --hold: #8b95a1;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-terminal);
            color: var(--text-main);
            padding: 24px;
            min-height: 100vh;
        }

        .terminal-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        @media (max-width: 1000px) {
            .terminal-container { grid-template-columns: 1fr; }
            body { padding: 16px; }
        }

        /* Top Bar */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-badge { 
            background: var(--accent); 
            color: #fff; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 13px; 
            letter-spacing: -0.2px;
        }
        .market-ticker { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }

        /* Left Side: Charts */
        .chart-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow);
            position: relative;
        }

        #tvChart {
            width: 100%;
            height: 500px;
            border-radius: 12px;
            overflow: hidden;
        }

        .chart-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
        }

        /* Right Side: Panels */
        .side-bar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-display {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .decision-badge {
            display: inline-block;
            padding: 12px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            width: 100%;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        .badge-buy { background: #fff1f2; color: var(--buy); }
        .badge-sell { background: #ebf4ff; color: var(--sell); }
        .badge-hold { background: #f2f4f6; color: var(--hold); }

        .indicator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .indicator-item {
            background: #f9fafb;
            padding: 16px;
            border-radius: 16px;
        }

        .ind-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
        .ind-value { font-size: 16px; font-weight: 700; color: var(--text-main); }

        /* AI Insight */
        .analysis-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333d4b;
            background: #f9fafb;
            padding: 20px;
            border-radius: 16px;
            word-break: keep-all;
        }

        /* History */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f2f4f6;
        }
        .history-item:last-child { border-bottom: none; }

        .history-price { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .history-time { font-size: 12px; color: var(--text-dim); }

        /* Status */
        #connectionStatus {
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #connectionStatus::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        .version-badge {
            font-size: 11px;
            color: #adb5bd;
            font-weight: 500;
            margin-left: 10px;
            background: #f1f3f5;
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <header>
            <div class="logo-area">
                <div class="logo-badge">PRO-AI</div>
                <div class="market-ticker">BTC / KRW</div>
                <span class="version-badge">v1.3.0</span>
            </div>
            <div id="connectionStatus">Terminal Live</div>
        </header>

        <main class="main-content">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">INSTITUTIONAL REAL-TIME CHART</div>
                    <div style="font-size: 12px; font-weight: 600; color: var(--text-dim);">BTCUSDT (UPBIT)</div>
                </div>
                <div id="tvChart"></div>
            </div>
        </main>

        <!-- Sidebar Section -->
        <div class="side-bar">
            <!-- Market Status Panel -->
            <div class="panel">
                <div class="panel-title">Real-time Terminal</div>
                <div class="price-display" id="mainPrice">--</div>
                <div id="mainDecision" class="decision-badge badge-hold">AWAITING SIGNAL</div>
                
                <div class="indicator-grid">
                    <div class="indicator-item">
                        <div class="ind-label">RSI (14)</div>
                        <div class="ind-value" id="rsiVal">--</div>
                    </div>
                    <div class="indicator-item">
                        <div class="ind-label">MFI</div>
                        <div class="ind-value" id="mfiVal">--</div>
                    </div>
                    <div class="indicator-item">
                        <div class="ind-label">SuperTrend</div>
                        <div class="ind-value" id="stVal">--</div>
                    </div>
                    <div class="indicator-item">
                        <div class="ind-label">Trend Structure</div>
                        <div class="ind-value" id="trendVal">--</div>
                    </div>
                </div>
            </div>

            <!-- AI Insight Panel -->
            <div class="panel">
                <div class="panel-title">AI Quantitative Insight</div>
                <div id="aiReason" class="analysis-text">퀀트 엔진 분석 데이터 수신 중...</div>
            </div>

            <!-- Trade History -->
            <div class="panel">
                <div class="panel-title">Log History</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        let chart, candleSeries, volumeSeries, ema20Series, ema50Series;
        let isChartInitialized = false;

        function initChart() {
            try {
                const chartContainer = document.getElementById('tvChart');
                if (!chartContainer) {
                    console.error("Chart container #tvChart not found.");
                    return;
                }

                const chartOptions = {
                    layout: {
                        background: { type: 'solid', color: '#ffffff' },
                        textColor: '#4e5968',
                    },
                    grid: {
                        vertLines: { color: '#f2f4f6' },
                        horzLines: { color: '#f2f4f6' },
                    },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    priceScale: { borderColor: '#f2f4f6' },
                    timeScale: { borderColor: '#f2f4f6', timeVisible: true, secondsVisible: false },
                };

                chart = LightweightCharts.createChart(chartContainer, chartOptions);
                
                candleSeries = chart.addCandlestickSeries({
                    upColor: '#f04452', downColor: '#3182f6', borderVisible: false,
                    wickUpColor: '#f04452', wickDownColor: '#3182f6',
                });

                volumeSeries = chart.addHistogramSeries({
                    color: '#f04452',
                    priceFormat: { type: 'volume' },
                    priceScaleId: '',
                });
                volumeSeries.priceScale().applyOptions({
                    scaleMargins: { top: 0.8, bottom: 0 },
                });

                ema20Series = chart.addLineSeries({ color: '#2962FF', lineWidth: 1, title: 'EMA 20' });
                ema50Series = chart.addLineSeries({ color: '#FF6D00', lineWidth: 1, title: 'EMA 50' });

                window.addEventListener('resize', () => {
                    chart.applyOptions({ width: chartContainer.clientWidth });
                });

                isChartInitialized = true;
                console.log("Chart initialized successfully.");
            } catch (err) {
                console.error("Failed to initialize chart:", err);
            }
        }

        async function loadTradingData() {
            try {
                const response = await fetch('logs/trading_log.json');
                const data = await response.json();
                
                if (!data || data.length === 0) return;

                // Find the latest entry with data
                let latestWithData = null;
                for (let i = data.length - 1; i >= 0; i--) {
                    if (data[i].ohlcv_with_indicators_last_24h) {
                        latestWithData = data[i];
                        break;
                    }
                }

                const latest = data[data.length - 1];
                updateUI(latest);
                updateHistory(data);

                if (!latestWithData || !isChartInitialized) {
                    console.warn("Waiting for chart data/initialization...");
                    return;
                }
                
                const ohlcvData = latestWithData.ohlcv_with_indicators_last_24h;
                const candleData = [];
                const volumeData = [];
                const ema20Data = [];
                const ema50Data = [];

                const sortedTimeKeys = Object.keys(ohlcvData).sort();
                
                sortedTimeKeys.forEach(timeStr => {
                    const d = ohlcvData[timeStr];
                    const timestamp = Math.floor(new Date(timeStr).getTime() / 1000);
                    
                    candleData.push({
                        time: timestamp,
                        open: d.open, high: d.high, low: d.low, close: d.close
                    });
                    
                    volumeData.push({
                        time: timestamp,
                        value: d.volume,
                        color: d.close >= d.open ? 'rgba(240, 68, 82, 0.3)' : 'rgba(49, 130, 246, 0.3)'
                    });

                    if (d.ema_20) ema20Data.push({ time: timestamp, value: d.ema_20 });
                    if (d.ema_50) ema50Data.push({ time: timestamp, value: d.ema_50 });
                });

                if (candleSeries) candleSeries.setData(candleData);
                if (volumeSeries) volumeSeries.setData(volumeData);
                if (ema20Series) ema20Series.setData(ema20Data);
                if (ema50Series) ema50Series.setData(ema50Data);

                chart.timeScale().fitContent();

            } catch (error) {
                console.error('Data loading error:', error);
            }
        }

        function updateUI(latest) {
            if (!latest) return;
            document.getElementById('mainPrice').innerText = (latest.current_price || 0).toLocaleString() + ' KRW';
            const decision = latest.decision || 'HOLD';
            const badge = document.getElementById('mainDecision');
            badge.innerText = decision === 'BUY' ? 'STRONG BUY SIGNAL' : (decision === 'SELL' ? 'SELL SIGNAL' : 'NEUTRAL / HOLD');
            badge.className = 'decision-badge ' + (decision === 'BUY' ? 'badge-buy' : (decision === 'SELL' ? 'badge-sell' : 'badge-hold'));

            if (latest.market_summary_now) {
                const msn = latest.market_summary_now;
                document.getElementById('rsiVal').innerText = msn.rsi || '--';
                document.getElementById('mfiVal').innerText = msn.mfi || '--';
                document.getElementById('stVal').innerText = msn.supertrend === 1 ? 'Bullish' : (msn.supertrend === -1 ? 'Bearish' : '--');
                document.getElementById('stVal').style.color = msn.supertrend === 1 ? 'var(--buy)' : 'var(--sell)';
                document.getElementById('trendVal').innerText = msn.trend_ema20_vs_50 || '--';
            }

            document.getElementById('aiReason').innerText = latest.reason || '분석 중...';
        }

        function updateHistory(data) {
            const list = document.getElementById('historyList');
            if (!list || !data) return;
            const reverseData = data.slice().reverse();
            list.innerHTML = reverseData.slice(0, 20).map(log => `
                <div class="history-item">
                    <div>
                        <div class="history-price">${(log.current_price || 0).toLocaleString()}</div>
                        <div class="history-time">${log.timestamp ? log.timestamp.split(' ')[1] : '--:--:--'}</div>
                    </div>
                    <div style="font-weight: 700; color: ${log.decision === 'BUY' ? 'var(--buy)' : (log.decision === 'SELL' ? 'var(--sell)' : 'var(--text-dim)')}">
                        ${log.decision || 'HOLD'}
                    </div>
                </div>
            `).join('');
        }

        window.addEventListener('DOMContentLoaded', () => {
            initChart();
            loadTradingData();
            setInterval(loadTradingData, 60000);
        });
    </script>
</body>
</html>
