<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 비트코인 투자 리포트</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f2f4f6; /* 토스풍 라이트 그레이 */
            --card-bg: #ffffff;
            --accent-color: #3182f6; /* 토스 블루 */
            --text-primary: #191f28;
            --text-secondary: #4e5968;
            --buy-color: #f04452; /* 한국인 친숙한 매수(빨강) */
            --sell-color: #3182f6; /* 매도(파랑) */
            --hold-color: #8b95a1;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 28px; /* 애플/토스 특유의 둥근 모서리 */
            padding: 32px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: #f9fafb;
            padding: 20px;
            border-radius: 20px;
            text-align: left;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .reasoning-box {
            background: #f2f4f6;
            padding: 24px;
            border-radius: 20px;
            margin-top: 16px;
        }

        .reasoning-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .reasoning-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .chart-container {
            height: 300px;
            margin: 20px 0;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .history-table th {
            text-align: left;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid #eff2f5;
        }

        .history-table td {
            padding: 20px 16px;
            font-size: 15px;
            border-bottom: 1px solid #f9fafb;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
        }

        .tag-buy { background: #fff0f0; color: var(--buy-color); }
        .tag-sell { background: #e8f3ff; color: var(--sell-color); }
        .tag-hold { background: #f2f4f6; color: var(--hold-color); }

        .price-up { color: var(--buy-color); }
        .price-down { color: var(--sell-color); }

        @media (max-width: 768px) {
            .main-stats { grid-template-columns: 1fr; }
            body { padding: 16px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>비트코인 전략 리포트</h1>
                <p class="subtitle">AI가 분석한 실시간 투자 가이드</p>
            </div>
            <div id="lastUpdate" style="font-size: 13px; color: var(--text-secondary);">업데이트 확인 중...</div>
        </header>

        <div class="grid">
            <!-- 요약 카드 -->
            <div class="card">
                <div class="card-title">오늘의 요약</div>
                <div class="main-stats">
                    <div class="stat-box">
                        <div class="stat-label">현재 가격</div>
                        <div class="stat-value" id="currentPrice">---</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">AI 판단</div>
                        <div class="stat-value" id="latestDecision">---</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">분석 신뢰도</div>
                        <div class="stat-value" id="latestConfidence">---</div>
                    </div>
                </div>
                <div class="reasoning-box">
                    <div class="reasoning-label">AI의 상세 분석</div>
                    <div id="latestReason" class="reasoning-text">데이터를 불러오는 중입니다...</div>
                </div>
            </div>

            <!-- 차트 카드 -->
            <div class="card">
                <div class="card-title">시세 추이와 매매 신호</div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 내역 카드 -->
            <div class="card">
                <div class="card-title">분석 히스토리</div>
                <div style="overflow-x: auto;">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>시간</th>
                                <th>결정</th>
                                <th>가격</th>
                                <th>신뢰도</th>
                                <th>분석 요약</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('logs/trading_log.json');
                const data = await response.json();
                const logs = data.slice().reverse();

                if (logs.length > 0) {
                    const latest = logs[0];
                    document.getElementById('currentPrice').innerText = latest.current_price.toLocaleString() + '원';
                    document.getElementById('latestDecision').innerText = latest.decision === 'BUY' ? '매수' : (latest.decision === 'SELL' ? '매도' : '관망');
                    document.getElementById('latestDecision').className = 'stat-value ' + (latest.decision === 'BUY' ? 'price-up' : (latest.decision === 'SELL' ? 'price-down' : ''));
                    document.getElementById('latestConfidence').innerText = (latest.confidence * 100).toFixed(0) + '%';
                    document.getElementById('latestReason').innerText = latest.reason;
                    document.getElementById('lastUpdate').innerText = '최근 분석: ' + latest.timestamp;

                    const historyBody = document.getElementById('historyBody');
                    historyBody.innerHTML = logs.map(log => {
                        const decisionKR = log.decision === 'BUY' ? '매수' : (log.decision === 'SELL' ? '매도' : '관망');
                        const tagClass = log.decision === 'BUY' ? 'tag-buy' : (log.decision === 'SELL' ? 'tag-sell' : 'tag-hold');
                        return `
                            <tr>
                                <td style="color: var(--text-secondary); font-size: 13px;">${log.timestamp.split(' ')[1]}</td>
                                <td><span class="tag ${tagClass}">${decisionKR}</span></td>
                                <td style="font-weight: 600;">${log.current_price.toLocaleString()}원</td>
                                <td>${(log.confidence * 100).toFixed(0)}%</td>
                                <td class="reasoning-text" style="font-size: 13px; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${log.reason}</td>
                            </tr>
                        `;
                    }).join('');

                    updateChart(logs.slice().reverse());
                }
            } catch (error) {
                console.error('데이터 로드 실패:', error);
            }
        }

        function updateChart(logs) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const labels = logs.map(l => l.timestamp.split(' ')[1]);
            const prices = logs.map(l => l.current_price);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '비트코인 가격',
                        data: prices,
                        borderColor: '#3182f6',
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, 'rgba(49, 130, 246, 0.2)');
                            gradient.addColorStop(1, 'rgba(49, 130, 246, 0)');
                            return gradient;
                        },
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: logs.map(l => 
                            l.decision === 'BUY' ? '#f04452' : (l.decision === 'SELL' ? '#3182f6' : '#8b95a1')
                        ),
                        pointRadius: 5,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#8b95a1', font: { size: 11 } } },
                        y: { 
                            grid: { color: '#f2f4f6' }, 
                            ticks: { 
                                color: '#8b95a1', 
                                font: { size: 11 },
                                callback: function(value) { return (value/10000).toLocaleString() + '만'; }
                            } 
                        }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
